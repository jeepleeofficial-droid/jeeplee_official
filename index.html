<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title"></title>
<style>
  :root {
    --almond: #DE9151;
    --brandy: #881E06;
    --granite: #3B5249;
    --ink: #111;
    --mute: #888;
    --line: #ccc;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: #fff;
    color: var(--ink);
    /* Ivakota-style: Georgia serif for body, system sans for UI */
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.8;
  }

  img { display: block; max-width: 100%; }
  a { color: inherit; }

  /* ── NAV ── */
  nav {
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }

  nav a {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink);
    transition: color .15s;
  }

  nav a:hover { color: var(--almond); }

  .nav-book {
    color: var(--brandy) !important;
    border-bottom: 1px solid var(--brandy);
    padding-bottom: 1px;
  }

  .nav-book:hover { opacity: .7; }

  /* ── HERO ── */
  .hero {
    position: relative;
    width: 100%;
    height: 88vh;
    overflow: hidden;
  }

  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.65);
  }

  .hero-ph {
    width: 100%;
    height: 100%;
    background: #1a1008;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 14px;
    padding: 40px;
  }

  .hero-title {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: bold;
    font-size: clamp(28px, 5vw, 64px);
    letter-spacing: 0.32em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
    padding-right: 0.32em;
  }

  .hero-sub {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.72);
    text-transform: uppercase;
  }

  .hero-links {
    display: flex;
    gap: 20px;
    margin-top: 6px;
  }

  .hero-links a {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    text-transform: uppercase;
    border-bottom: 0.5px solid rgba(255,255,255,0.3);
    padding-bottom: 1px;
    transition: color .15s;
  }

  .hero-links a:hover { color: var(--almond); }

  /* ── CONTENT WRAPPER ── */
  .content {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 40px;
  }

  /* ── SECTION ── */
  .sec {
    padding: 68px 0;
    border-top: 1px solid var(--line);
  }

  .sec-label {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--almond);
    margin-bottom: 28px;
  }

  h2 {
    font-family: Georgia, serif;
    font-weight: normal;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 18px;
    line-height: 1.3;
  }

  h3 {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: bold;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 36px 0 10px;
  }

  p {
    margin-bottom: 1em;
    color: var(--ink);
  }

  p:last-child { margin-bottom: 0; }

  .sig {
    margin-top: 24px;
    font-style: italic;
    color: var(--mute);
  }

  /* ── GEAR LIST ── */
  .gear-block {
    margin-top: 28px;
    border-top: 1px solid var(--line);
  }

  .gear-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 11px 0;
    border-bottom: 1px solid var(--line);
    gap: 24px;
  }

  .gear-name {
    font-family: Georgia, serif;
    font-size: 15px;
    color: var(--ink);
  }

  .gear-note {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--mute);
    text-align: right;
    flex-shrink: 0;
  }

  /* ── RATES ── */
  .rate-item {
    padding: 16px 0;
    border-bottom: 1px solid var(--line);
  }

  .rate-item:first-child { border-top: 1px solid var(--line); }

  .rate-label {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mute);
    margin-bottom: 4px;
  }

  .rate-price {
    font-family: Georgia, serif;
    font-size: 17px;
    color: var(--ink);
  }

  .rate-note {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--mute);
    margin-top: 2px;
  }

  /* ── PHOTOS ── */
  .photo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
    margin: 28px 0;
  }

  .photo-ph {
    aspect-ratio: 4/3;
    background: #e8e4e0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .photo-ph img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .photo-ph-label {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mute);
  }

  .photo-full {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    margin: 20px 0;
    display: block;
  }

  .photo-full-ph {
    width: 100%;
    aspect-ratio: 16/9;
    background: #e8e4e0;
    margin: 20px 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .photo-full-ph img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-full-ph .photo-ph-label { display: block; }

  /* ── CTA ── */
  .cta-wrap { margin-top: 32px; }

  .cta {
    display: inline-block;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: bold;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    background: var(--brandy);
    color: #fff;
    padding: 12px 24px;
    transition: opacity .15s;
  }

  .cta:hover { opacity: .82; }

  /* ── CONTACT ── */
  .contact-line {
    margin-bottom: 6px;
  }

  .contact-link {
    color: var(--granite);
    text-decoration: none;
    border-bottom: 0.5px solid var(--granite);
    padding-bottom: 1px;
    transition: color .15s;
  }

  .contact-link:hover { color: var(--ink); border-color: var(--ink); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--line);
    padding: 40px;
    text-align: center;
  }

  .footer-logo {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 10px;
  }

  .footer-meta {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--mute);
    line-height: 2.0;
  }

  .footer-meta a {
    color: var(--almond);
    text-decoration: none;
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    nav { padding: 14px 20px; gap: 14px; }
    .content { padding: 0 20px; }
    .sec { padding: 48px 0; }
    .photo-grid { grid-template-columns: 1fr; }
    footer { padding: 32px 20px; }
  }
</style>
</head>
<body>

<nav id="nav-links"></nav>

<div class="hero" id="hero">
  <div class="hero-ph" id="hero-ph"></div>
  <div class="hero-overlay">
    <div class="hero-title" id="hero-title"></div>
    <div class="hero-sub"   id="hero-sub"></div>
    <div class="hero-links" id="hero-links"></div>
  </div>
</div>

<div class="content">

  <!-- ABOUT -->
  <div class="sec" id="about">
    <div class="sec-label">About</div>
    <div id="about-content"></div>
  </div>

  <!-- SPACES -->
  <div class="sec" id="spaces">
    <div class="sec-label">Spaces</div>
    <div id="spaces-content"></div>
  </div>

  <!-- GEAR -->
  <div class="sec" id="gear">
    <div class="sec-label">Gear</div>
    <div id="gear-content"></div>
  </div>

  <!-- RATES -->
  <div class="sec" id="rates">
    <div class="sec-label">Rates</div>
    <div id="rates-content"></div>
  </div>

  <!-- CONTACT -->
  <div class="sec" id="contact">
    <div class="sec-label">Contact</div>
    <div id="contact-content"></div>
  </div>

</div>

<footer id="footer"></footer>

<script>
fetch('content.json')
  .then(r => r.json())
  .then(c => render(c))
  .catch(e => console.error('content.json 載入失敗:', e));

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function paras(arr) {
  return arr.map(t => `<p>${esc(t)}</p>`).join('');
}

function render(c) {
  /* title */
  document.getElementById('page-title').textContent = c.site.title;

  /* nav */
  const navLinks = c.nav.map(n =>
    `<a href="${esc(n.href)}">${esc(n.label)}</a>`
  ).join('');
  document.getElementById('nav-links').innerHTML =
    navLinks + `<a href="${esc(c.booking_url)}" target="_blank" class="nav-book">預約 →</a>`;

  /* hero */
  const ph = document.getElementById('hero-ph');
  if (c.hero.image) {
    const img = document.createElement('img');
    img.src = c.hero.image;
    img.alt = c.hero.title;
    img.className = 'hero-img';
    img.onerror = function() { this.style.display = 'none'; };
    ph.appendChild(img);
  }
  document.getElementById('hero-title').textContent = c.hero.title;
  document.getElementById('hero-sub').textContent   = c.hero.sub;
  document.getElementById('hero-links').innerHTML =
    `<a href="${esc(c.instagram_url)}" target="_blank">Instagram</a>` +
    `<a href="${esc(c.booking_url)}"   target="_blank">立即預約</a>`;

  /* about */
  let about = `<h2>${esc(c.about.heading)}</h2>` + paras(c.about.paragraphs);
  about += `<h2>${esc(c.about.founders_heading)}</h2>` + paras(c.about.founders_paragraphs);
  about += `<p class="sig">${esc(c.about.sig)}</p>`;
  document.getElementById('about-content').innerHTML = about;

  /* photo grid after about paragraphs */
  const grid = document.createElement('div');
  grid.className = 'photo-grid';
  const gridItems = [
    { src: 'room_main.jpg',    label: '彩排大廳' },
    { src: 'room_drum.jpg',    label: '鼓房'     },
    { src: 'room_control.jpg', label: '控制室'   },
    { src: null,               label: '客廳 · 即將更新' },
  ];
  gridItems.forEach(item => {
    const cell = document.createElement('div');
    cell.className = 'photo-ph';
    if (item.src) {
      cell.innerHTML = `<img src="${esc(item.src)}" alt="${esc(item.label)}" onerror="this.parentElement.innerHTML='<span class=photo-ph-label>${esc(item.label)}</span>'">`;
    } else {
      cell.innerHTML = `<span class="photo-ph-label">${esc(item.label)}</span>`;
    }
    grid.appendChild(cell);
  });
  /* insert grid after first h2 */
  const aboutEl = document.getElementById('about-content');
  const firstH2 = aboutEl.querySelector('h2 + p:last-of-type');
  aboutEl.insertBefore(grid, aboutEl.querySelector('h2:nth-of-type(2)'));

  /* spaces */
  let spaces = '';
  c.spaces.forEach(s => {
    spaces += `<h2>${esc(s.name)}<span style="font-family:Arial,sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin-left:14px;">${esc(s.en)}</span></h2>`;
    spaces += paras(s.paragraphs);
    if (s.image) {
      spaces += `<div class="photo-full-ph"><img src="${esc(s.image)}" alt="${esc(s.name)}" onerror="this.parentElement.innerHTML='<span class=photo-ph-label>${esc(s.name)}</span>'"></div>`;
    } else {
      spaces += `<div class="photo-full-ph"><span class="photo-ph-label">即將更新</span></div>`;
    }
  });
  document.getElementById('spaces-content').innerHTML = spaces;

  /* gear */
  let gear = paras(c.gear.intro);
  gear += '<div class="gear-block">';
  c.gear.list.forEach(g => {
    gear += `<div class="gear-row"><span class="gear-name">${esc(g.name)}</span><span class="gear-note">${esc(g.note)}</span></div>`;
  });
  gear += '</div>';
  document.getElementById('gear-content').innerHTML = gear;

  /* rates */
  let rates = c.rates.items.map(r => `
    <div class="rate-item">
      <div class="rate-label">${esc(r.label)}</div>
      <div class="rate-price">${esc(r.price)}</div>
      <div class="rate-note">${esc(r.note)}</div>
    </div>`).join('');
  rates += '<h3 style="margin-top:36px;">預約方式</h3>';
  rates += paras(c.rates.notes);
  rates += `<div class="cta-wrap"><a href="${esc(c.booking_url)}" target="_blank" class="cta">查看可預約時段</a></div>`;
  document.getElementById('rates-content').innerHTML = rates;

  /* contact */
  let contact = c.contact.address.map(l => `<div class="contact-line">${esc(l)}</div>`).join('');
  contact += `<div class="contact-line" style="margin-top:16px;">Instagram：<a href="${esc(c.instagram_url)}" target="_blank" class="contact-link">${esc(c.instagram_handle)}</a></div>`;
  contact += `<div class="contact-line">開放時間：${esc(c.contact.hours)}</div>`;
  contact += `<div class="cta-wrap"><a href="${esc(c.booking_url)}" target="_blank" class="cta">立即預約</a></div>`;
  document.getElementById('contact-content').innerHTML = contact;

  /* footer */
  document.getElementById('footer').innerHTML = `
    <div class="footer-logo">${esc(c.site.logo)}</div>
    <div class="footer-meta">
      ${esc(c.footer.tagline)}<br>
      新北市中和區 · 景安站斜對面 · ${esc(c.contact.hours)}<br>
      <a href="${esc(c.instagram_url)}" target="_blank">${esc(c.instagram_handle)}</a>
      &nbsp;·&nbsp;
      <a href="${esc(c.booking_url)}" target="_blank">立即預約</a><br><br>
      © 2026 橘譜立彩排室 JeepLee
    </div>`;
}
</script>

</body>
</html>
