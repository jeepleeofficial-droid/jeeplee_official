<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">橘譜立 JeepLee 彩排室</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="512x512" href="favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
<style>
  :root {
    --almond: #DE9151;
    --brandy: #881E06;
    --granite: #3B5249;
    --ink: #111;
    --mute: #888;
    --line: #ccc;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: #fff;
    color: var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.8;
  }

  img { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }

  /* ── NAV ── */
  nav {
    padding: 18px 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }

  nav a {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
    transition: color .15s;
  }

  nav a:hover { color: var(--almond); }

  .nav-book {
    color: var(--brandy) !important;
    border-bottom: 1px solid var(--brandy);
    padding-bottom: 1px;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    background-color: #1a1008;
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    padding: 40px;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.42);
  }

  .hero > * { position: relative; z-index: 1; }

  .hero-title {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: bold;
    font-size: clamp(28px, 5vw, 64px);
    letter-spacing: 0.32em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
    padding-right: 0.32em;
  }

  .hero-sub {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
  }

  .hero-links {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .hero-links a {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    border-bottom: 0.5px solid rgba(255,255,255,0.3);
    padding-bottom: 1px;
    transition: color .15s;
  }

  .hero-links a:hover { color: var(--almond); }

  .hero-links .hero-book {
    color: #fff;
    border-color: rgba(255,255,255,0.6);
  }

  /* ── CONTENT ── */
  .content {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 48px;
  }

  /* ── SECTION ── */
  .sec {
    padding: 72px 0;
    border-top: 1px solid var(--line);
  }

  .sec-label {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--almond);
    margin-bottom: 28px;
  }

  h2 {
    font-family: Georgia, serif;
    font-weight: normal;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 18px;
    line-height: 1.3;
  }

  h3 {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: bold;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 36px 0 10px;
  }

  p {
    margin-bottom: 1em;
    color: var(--ink);
    line-height: 1.85;
  }

  p:last-child { margin-bottom: 0; }

  .sig {
    margin-top: 24px;
    font-style: italic;
    color: var(--mute);
  }

  /* ── GEAR LIST ── */
  .gear-block {
    margin-top: 28px;
    border-top: 1px solid var(--line);
  }

  .gear-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 11px 0;
    border-bottom: 1px solid var(--line);
    gap: 24px;
  }

  .gear-name { font-family: Georgia, serif; font-size: 15px; color: var(--ink); }
  .gear-note { font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 0.06em; color: var(--mute); text-align: right; flex-shrink: 0; }

  /* ── RATES ── */
  .rate-item { padding: 16px 0; border-bottom: 1px solid var(--line); }
  .rate-item:first-child { border-top: 1px solid var(--line); }
  .rate-label { font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mute); margin-bottom: 4px; }
  .rate-price { font-family: Georgia, serif; font-size: 17px; color: var(--ink); }
  .rate-note  { font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 0.05em; color: var(--mute); margin-top: 2px; }

  /* ── CONTACT ── */
  .contact-line { margin-bottom: 6px; font-family: Georgia, serif; }
  .contact-link { color: var(--granite); border-bottom: 0.5px solid var(--granite); padding-bottom: 1px; transition: color .15s; }
  .contact-link:hover { color: var(--ink); border-color: var(--ink); }

  /* ── CTA ── */
  .cta-wrap { margin-top: 32px; }
  .cta {
    display: inline-block;
    font-family: Arial, sans-serif;
    font-weight: bold;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: var(--brandy);
    color: #fff;
    padding: 12px 24px;
    transition: opacity .15s;
  }
  .cta:hover { opacity: .82; }

  /* ── SLIDER (Ivakota 風格：中間主圖，左右半透明，點擊換張) ── */
  .slider-wrap {
    position: relative;
    width: 100%;
    overflow: hidden;
    background: #fff;
    padding: 0;
    user-select: none;
  }

  .slider-track {
    display: flex;
    align-items: center;
    gap: 12px;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 48px 0;
  }

  .slider-slide {
    flex: 0 0 auto;
    width: 58vw;
    aspect-ratio: 76 / 50;
    overflow: hidden;
    background: #e8e4e0;
    opacity: 0.38;
    transition: opacity 0.5s ease, transform 0.5s ease;
    cursor: pointer;
    position: relative;
  }

  .slider-slide.active {
    opacity: 1;
    cursor: default;
  }

  .slider-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  .slider-slide .slide-label {
    position: absolute;
    bottom: 14px;
    left: 16px;
    font-family: Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .slider-slide.active .slide-label { opacity: 1; }

  .slider-arrows {
    position: absolute;
    inset: 0;
    display: flex;
    pointer-events: none;
  }

  .slider-arrow {
    flex: 1;
    display: flex;
    align-items: center;
    pointer-events: all;
    cursor: pointer;
    padding: 0 28px;
  }

  .slider-arrow.right { justify-content: flex-end; }

  .slider-arrow svg {
    width: 36px;
    height: 36px;
    stroke: rgba(255,255,255,0);
    transition: stroke 0.2s;
  }

  .slider-wrap:hover .slider-arrow svg {
    stroke: rgba(255,255,255,0.7);
  }

  .slider-arrow:hover svg { stroke: #fff !important; }

  @media (max-width: 600px) {
    .slider-slide { width: 80vw; }
    .slider-track { gap: 8px; padding: 32px 0; }
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--line);
    padding: 40px;
    text-align: center;
  }

  .footer-logo {
    font-family: Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 10px;
  }

  .footer-meta {
    font-family: Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--mute);
    line-height: 2.0;
  }

  .footer-meta a { color: var(--almond); }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    nav { padding: 14px 20px; gap: 14px; }
    .content { padding: 0 20px; }
    .sec { padding: 52px 0; }
    .gallery-item { width: 85vw; height: 110vw; max-height: none; }
    footer { padding: 32px 20px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav-el"></nav>

<!-- HERO -->
<div class="hero" id="hero-el">
  <div class="hero-title" id="hero-title"></div>
  <div class="hero-sub"   id="hero-sub"></div>
  <div class="hero-links" id="hero-links"></div>
</div>

<div class="content">

  <!-- 關於我們 -->
  <div class="sec" id="about">
    <div class="sec-label">關於我們</div>
    <div id="about-content"></div>
  </div>

</div>

<!-- 空間：全幅橫向捲動，不放在 content 裡 -->
<div style="border-top: 1px solid var(--line);" id="spaces">
  <div class="content" style="padding-top: 72px; padding-bottom: 40px;">
    <div class="sec-label">空間</div>
  </div>
  <div class="slider-wrap" id="slider-wrap">
  <div class="slider-track" id="slider-track"></div>
  <div class="slider-arrows">
    <div class="slider-arrow left" id="slider-prev">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </div>
    <div class="slider-arrow right" id="slider-next">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
  </div>
</div>
  
</div>

<div class="content">

  <!-- 設備 -->
  <div class="sec" id="gear">
    <div class="sec-label">設備</div>
    <div id="gear-content"></div>
  </div>

  <!-- 費用 -->
  <div class="sec" id="rates">
    <div class="sec-label">費用</div>
    <div id="rates-content"></div>
  </div>

  <!-- 聯絡 -->
  <div class="sec" id="contact">
    <div class="sec-label">聯絡</div>
    <div id="contact-content"></div>
  </div>

</div>

<!-- FOOTER -->
<footer id="footer-el"></footer>

<script>
fetch('content.json')
  .then(function(r) { return r.json(); })
  .then(function(c) { render(c); })
  .catch(function(e) { console.error('content.json 載入失敗:', e); });

function get(obj, path, fallback) {
  if (fallback === undefined) fallback = '';
  var val = path.split('.').reduce(function(o, k) { return o != null ? o[k] : undefined; }, obj);
  return val != null ? val : fallback;
}

function esc(s) {
  return String(s != null ? s : '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function paras(arr) {
  if (!Array.isArray(arr) || arr.length === 0) return '';
  return arr.map(function(t) { return '<p>' + esc(t) + '</p>'; }).join('');
}

function render(c) {

  /* title */
  var titleEl = document.getElementById('page-title');
  if (titleEl && get(c,'site.title')) titleEl.textContent = get(c,'site.title');

  /* nav */
  var navEl = document.getElementById('nav-el');
  if (navEl) {
    var links = Array.isArray(c.nav) ? c.nav : [];
    var html = links.map(function(n) {
      return '<a href="' + esc(n.href) + '">' + esc(n.label) + '</a>';
    }).join('');
    var bu = get(c,'booking_url');
    if (bu) html += '<a href="' + esc(bu) + '" target="_blank" class="nav-book">預約 →</a>';
    navEl.innerHTML = html;
  }

  /* hero — parallax bg */
  var heroEl = document.getElementById('hero-el');
  if (heroEl && get(c,'hero.image')) {
    heroEl.style.backgroundImage = 'url(' + get(c,'hero.image') + ')';
  }
  var htEl = document.getElementById('hero-title');
  if (htEl) htEl.textContent = get(c,'hero.title');
  var hsEl = document.getElementById('hero-sub');
  if (hsEl) hsEl.textContent = get(c,'hero.sub');

  /* hero links: IG, LINE, 預約 */
  var hlEl = document.getElementById('hero-links');
  if (hlEl) {
    var hl = '';
    var igUrl = get(c,'instagram_url'), igH = get(c,'instagram_handle');
    var lineId = get(c,'line_id');
    var bu2 = get(c,'booking_url');
    if (igUrl)  hl += '<a href="' + esc(igUrl) + '" target="_blank">' + esc(igH || 'Instagram') + '</a>';
    if (lineId) hl += '<a href="https://line.me/R/ti/p/' + esc(lineId) + '" target="_blank">LINE ' + esc(lineId) + '</a>';
    if (bu2)    hl += '<a href="' + esc(bu2) + '" target="_blank" class="hero-book">立即預約 →</a>';
    hlEl.innerHTML = hl;
  }

  /* 關於我們 */
  var aboutEl = document.getElementById('about-content');
  if (aboutEl && c.about) {
    var ah = '';
    if (c.about.heading)             ah += '<h2>' + esc(c.about.heading) + '</h2>';
    if (c.about.paragraphs)          ah += paras(c.about.paragraphs);
    if (c.about.founders_heading)    ah += '<h2>' + esc(c.about.founders_heading) + '</h2>';
    if (c.about.founders_paragraphs) ah += paras(c.about.founders_paragraphs);
    if (c.about.sig)                 ah += '<p class="sig">' + esc(c.about.sig) + '</p>';
    aboutEl.innerHTML = ah;
  }

  /* 空間 slider：中間主圖清晰，左右半透明，點擊換張 */
  var track = document.getElementById('slider-track');
  var wrap  = document.getElementById('slider-wrap');
  if (track && wrap) {
    var spaces = Array.isArray(c.spaces) ? c.spaces.filter(function(s){ return s.image; }) : [];
    var current = 0;

    function buildSlides() {
      track.innerHTML = '';
      spaces.forEach(function(s, i) {
        var slide = document.createElement('div');
        slide.className = 'slider-slide' + (i === current ? ' active' : '');
        var img = document.createElement('img');
        img.src = s.image;
        img.alt = s.name || '';
        img.draggable = false;
        slide.appendChild(img);
        if (s.name) {
          var lbl = document.createElement('span');
          lbl.className = 'slide-label';
          lbl.textContent = s.name;
          slide.appendChild(lbl);
        }
        (function(idx) {
          slide.addEventListener('click', function() {
            if (idx !== current) { goTo(idx); }
          });
        })(i);
        track.appendChild(slide);
      });
    }

    function goTo(idx) {
      if (spaces.length === 0) return;
      current = (idx + spaces.length) % spaces.length;
      updateSlider();
    }

    function updateSlider() {
      var slides = track.querySelectorAll('.slider-slide');
      slides.forEach(function(s, i) {
        s.classList.toggle('active', i === current);
      });
      if (!slides.length) return;

      /* 用 CSS vw 計算寬度，避免 offsetWidth 為 0 的問題 */
      var vw = window.innerWidth;
      var isMobile = vw <= 600;
      var slideVw = isMobile ? 0.80 : 0.58;
      var slideW = vw * slideVw;
      var gap = isMobile ? 8 : 12;
      var wrapW = wrap.offsetWidth || vw;
      var offset = (wrapW / 2) - (slideW / 2) - current * (slideW + gap);
      track.style.transform = 'translateX(' + offset + 'px)';
    }

    buildSlides();
    /* 多給幾次機會確保 layout 穩定 */
    setTimeout(updateSlider, 50);
    setTimeout(updateSlider, 200);
    setTimeout(updateSlider, 500);
    window.addEventListener('load', updateSlider);
    window.addEventListener('resize', updateSlider);

    var prevEl = document.getElementById('slider-prev');
    var nextEl = document.getElementById('slider-next');
    if (prevEl) prevEl.addEventListener('click', function() { goTo(current - 1); });
    if (nextEl) nextEl.addEventListener('click', function() { goTo(current + 1); });
  }

  /* 設備 */
  var gearEl = document.getElementById('gear-content');
  if (gearEl && c.gear) {
    var gh = paras(c.gear.intro);
    var gl = Array.isArray(c.gear.list) ? c.gear.list : [];
    if (gl.length > 0) {
      gh += '<div class="gear-block">';
      gl.forEach(function(g) {
        gh += '<div class="gear-row"><span class="gear-name">' + esc(g.name) + '</span>';
        if (g.note) gh += '<span class="gear-note">' + esc(g.note) + '</span>';
        gh += '</div>';
      });
      gh += '</div>';
    }
    gearEl.innerHTML = gh;
  }

  /* 費用 */
  var ratesEl = document.getElementById('rates-content');
  if (ratesEl && c.rates) {
    var ri = Array.isArray(c.rates.items) ? c.rates.items : [];
    var rh = ri.map(function(r) {
      var o = '<div class="rate-item">';
      if (r.label) o += '<div class="rate-label">' + esc(r.label) + '</div>';
      if (r.price) o += '<div class="rate-price">' + esc(r.price) + '</div>';
      if (r.note)  o += '<div class="rate-note">'  + esc(r.note)  + '</div>';
      return o + '</div>';
    }).join('');
    var rn = Array.isArray(c.rates.notes) ? c.rates.notes : [];
    if (rn.length > 0) {
      rh += '<h3 style="margin-top:36px;">預約方式</h3>';
      rh += paras(rn);
    }
    var bu3 = get(c,'booking_url');
    if (bu3) rh += '<div class="cta-wrap"><a href="' + esc(bu3) + '" target="_blank" class="cta">查看可預約時段</a></div>';
    ratesEl.innerHTML = rh;
  }

  /* 聯絡 */
  var contactEl = document.getElementById('contact-content');
  if (contactEl && c.contact) {
    var ch = '';
    var addr = Array.isArray(c.contact.address) ? c.contact.address : [];
    addr.forEach(function(l) { ch += '<div class="contact-line">' + esc(l) + '</div>'; });
    var igUrl2 = get(c,'instagram_url'), igH2 = get(c,'instagram_handle');
    var lineId2 = get(c,'line_id');
    var hrs = get(c,'contact.hours');
    if (hrs)     ch += '<div class="contact-line" style="margin-top:16px;">開放時間：' + esc(hrs) + '</div>';
    if (igUrl2)  ch += '<div class="contact-line">Instagram：<a href="' + esc(igUrl2) + '" target="_blank" class="contact-link">' + esc(igH2) + '</a></div>';
    if (lineId2) ch += '<div class="contact-line">LINE：<a href="https://line.me/R/ti/p/' + esc(lineId2) + '" target="_blank" class="contact-link">' + esc(lineId2) + '</a></div>';
    var bu4 = get(c,'booking_url');
    if (bu4) ch += '<div class="cta-wrap"><a href="' + esc(bu4) + '" target="_blank" class="cta">立即預約</a></div>';
    contactEl.innerHTML = ch;
  }

  /* footer */
  var footerEl = document.getElementById('footer-el');
  if (footerEl) {
    var logo = get(c,'site.logo'), tag = get(c,'footer.tagline');
    var hrs2 = get(c,'contact.hours');
    var igUrl3 = get(c,'instagram_url'), igH3 = get(c,'instagram_handle');
    var bu5 = get(c,'booking_url');
    var fh = '';
    if (logo) fh += '<div class="footer-logo">' + esc(logo) + '</div>';
    fh += '<div class="footer-meta">';
    if (tag)  fh += esc(tag) + '<br>';
    if (hrs2) fh += '新北市中和區 · 景安站斜對面 · ' + esc(hrs2) + '<br>';
    if (igUrl3) fh += '<a href="' + esc(igUrl3) + '" target="_blank">' + esc(igH3) + '</a>';
    if (igUrl3 && bu5) fh += ' &nbsp;·&nbsp; ';
    if (bu5) fh += '<a href="' + esc(bu5) + '" target="_blank">立即預約</a>';
    fh += '<br><br>© 2026 橘譜立彩排室 JeepLee</div>';
    footerEl.innerHTML = fh;
  }
}
</script>

</body>
</html>
